name: CI Pipeline

on:
    push:
        branches:
            - "feature/**"
    pull_request:
        branches:
            - main
            - develop

jobs:
    setup:
        runs-on: ubuntu-latest

        steps:
            - name: Run code
              run: echo "Running CI pipeline..."

            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: '3.12'

            - name: Install uv
              uses: astral-sh/setup-uv@v2
              with:
                version: "latest"

            - name: Install ruff
              uses: astral-sh/ruff-action@v3
              with:
                version: "latest"

            - name: Install dependencies
              run: uv sync

            - name: Cache uv cache
              uses: actions/cache@v3
              with:
                path: ~/.cache/uv
                key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}

            - name: Cache virtual environment
              uses: actions/cache@v3
              with:
                path: .venv
                key: venv-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}

            - name: Cache ruff
              uses: actions/cache@v3
              with:
                path: ~/.cache/ruff
                key: ruff-${{ runner.os }}

    test:
        runs-on: ubuntu-latest
        needs: setup
        steps:

            - name: Cache uv cache
              uses: actions/cache@v3
              with:
                path: ~/.cache/uv
                key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}

            - name: Cache virtual environment
              uses: actions/cache@v3
              with:
                path: .venv
                key: venv-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}

            - name: Cache ruff
              uses: actions/cache@v3
              with:
                path: ~/.cache/ruff
                key: ruff-${{ runner.os }}

            - name: Lint code
              run: ruff check .

            - name: Run tests
              run: uv run pytest -v -s