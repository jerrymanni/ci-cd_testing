name: Setup Python & uv
description: Install uv and set up Python with dependency caching

inputs:
  python-version:
    description: Python version to use
    required: false
    default: "3.12"

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true               # caches the uv package cache across runs
        cache-dependency-glob: "uv.lock" # invalidates cache when lockfile changes

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install dependencies
      shell: bash
      run: uv sync --frozen --all-extras